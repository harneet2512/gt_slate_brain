name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            ext: ""
          - os: macos-13
            goos: darwin
            goarch: amd64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.22"

      - name: Build gt-index
        working-directory: gt-index
        env:
          CGO_ENABLED: "1"
        run: |
          go build -ldflags="-s -w" -o ../gt-index-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/gt-index/

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gt-index-${{ matrix.goos }}-${{ matrix.goarch }}
          path: gt-index-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  create-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: binaries
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a375ba9127f6c39a9718 # v2
        with:
          files: binaries/*
          generate_release_notes: true
          body: |
            ## gt-index binaries

            Download the binary for your platform:
            - **Linux amd64**: `gt-index-linux-amd64`
            - **Linux arm64**: `gt-index-linux-arm64`
            - **macOS amd64**: `gt-index-darwin-amd64`
            - **macOS arm64 (Apple Silicon)**: `gt-index-darwin-arm64`
            - **Windows amd64**: `gt-index-windows-amd64.exe`

            ### Quick start
            ```bash
            chmod +x gt-index-*  # Linux/macOS only
            ./gt-index-linux-amd64 -root /path/to/repo -output graph.db
            ```
