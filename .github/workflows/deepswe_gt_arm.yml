name: "DeepSWE: GT arm (mini-swe-agent + GroundTruth)"

# Treatment arm paired with deepswe_baseline.yml. Same harness, model, config,
# tasks, disk fix — the ONLY difference is GroundTruth:
#   --agent-import-path artifact_deepswe.gt_agent:GTMiniSweAgent
#   in-container auto post-view / post-edit via /tmp/gt_patch/sitecustomize.py
#   (PYTHONPATH=/tmp/gt_patch, engine=/tmp/gt_hook.py)
#
# Phase 1 = Points B/C only (gt_hook self-indexes; no preindex needed). The
# first-turn brief (Point A) needs a preindexed graph.db and is added later.
# Set GT_BASELINE to turn GT off (then this equals the baseline arm).

on:
  workflow_dispatch:
    inputs:
      task_set:
        description: "smoke (5, one per language) | all | comma-separated task ids"
        required: true
        default: "smoke"
      model:
        description: "LLM model (litellm id)"
        required: true
        default: "deepseek/deepseek-v4-flash"
      max_parallel:
        description: "max concurrent task runners"
        required: true
        default: "5"

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install litellm
        run: pip install --quiet litellm
      - name: Ping model (flash + thinking DISABLED + temp 0)
        run: |
          python3 -c "import litellm; r=litellm.completion(model='${{ inputs.model }}', messages=[{'role':'user','content':'ping'}], max_tokens=5, temperature=0.0, extra_body={'thinking':{'type':'disabled'}}); print('MODEL OK:', r.choices[0].message.content)"

  setup:
    runs-on: ubuntu-latest
    needs: preflight
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        run: |
          set -euo pipefail
          SET="${{ inputs.task_set }}"
          if [ "$SET" = "smoke" ]; then
            TASKS="adaptix-name-mapping-aliases abs-module-cache-flags arktype-json-schema-refs-dependencies csstree-shorthand-expansion-compression boa-hierarchical-evaluation-cancellation"
          elif [ "$SET" = "all" ]; then
            git clone --depth 1 https://github.com/datacurve-ai/deep-swe.git _bench
            TASKS="$(ls _bench/tasks)"
          else
            TASKS="$(echo "$SET" | tr ',' ' ')"
          fi
          JSON=$(printf '%s\n' $TASKS | sed '/^$/d' | jq -R . | jq -cs .)
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          echo "Matrix: $JSON"

  gt_arm:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 150
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(inputs.max_parallel) }}
      matrix:
        task: ${{ fromJSON(needs.setup.outputs.matrix) }}
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - name: Maximize disk + relocate Docker to /mnt
        run: |
          echo "Disk before:"; df -h / /mnt | sed 's/^/  /'
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          sudo systemctl stop docker docker.socket 2>/dev/null || true
          sudo mkdir -p /etc/docker /mnt/docker
          echo '{"data-root":"/mnt/docker"}' | sudo tee /etc/docker/daemon.json
          sudo rm -rf /var/lib/docker
          sudo systemctl start docker
          sleep 3
          echo "Disk after:"; df -h / /mnt | sed 's/^/  /'

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pier
        run: pip install --quiet datacurve-pier

      - name: Sanity — GT payloads present
        run: |
          test -f artifact_deepswe/gt_agent.py || { echo "::error::missing gt_agent.py"; exit 1; }
          test -f artifact_deepswe/gt_mini_patch.py || { echo "::error::missing gt_mini_patch.py"; exit 1; }
          test -f benchmarks/swebench/gt_hook.py || { echo "::error::missing gt_hook.py"; exit 1; }
          python3 -c "import ast; ast.parse(open('artifact_deepswe/gt_agent.py').read()); ast.parse(open('artifact_deepswe/gt_mini_patch.py').read()); print('GT payloads parse OK')"

      - name: Clone deepswe-bench
        run: git clone --depth 1 https://github.com/datacurve-ai/deep-swe.git deepswe-bench

      - name: Validate task
        run: test -d "deepswe-bench/tasks/${{ matrix.task }}" || { echo "::error::missing task ${{ matrix.task }}"; exit 1; }

      - name: Run GT arm (mini-swe-agent + GroundTruth, thinking off, temp 0)
        run: |
          set -o pipefail
          pier run \
            -p "deepswe-bench/tasks/${{ matrix.task }}" \
            --agent-import-path artifact_deepswe.gt_agent:GTMiniSweAgent \
            -m "${{ inputs.model }}" \
            --ak cost_limit=5.0 \
            --ak config_file=.github/configs/deepswe_baseline_mini.yaml \
            --ae GT_HOOK_PATH=/opt/gt/gt_hook.py \
            --ae GT_ROOT_FILE=/opt/gt/gt_root.txt \
            --env docker \
            -n 1 \
            -o jobs \
            --job-name "${{ matrix.task }}" \
            -y 2>&1 | tee "gtarm_${{ matrix.task }}.log"

      - name: Parse result
        if: always()
        run: |
          echo "### ${{ matrix.task }} (GT arm)" >> "$GITHUB_STEP_SUMMARY"
          if [ -d jobs ]; then
            python3 scripts/deepswe_parse_result.py jobs >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- [WARN] no jobs/ dir — infra/resource failure (see log)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gtarm-${{ matrix.task }}
          path: |
            jobs/
            gtarm_${{ matrix.task }}.log
          retention-days: 30
          if-no-files-found: warn

  aggregate:
    needs: [setup, gt_arm]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: all_artifacts
      - name: Aggregate verdicts
        run: python3 scripts/deepswe_aggregate.py all_artifacts >> "$GITHUB_STEP_SUMMARY"
